<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOPHIA - ფილოსოფიური არქივი</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;700&family=Noto+Serif+Georgian:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #0f1115; --card: #1a1d23; --accent: #60a5fa; 
            --text-main: #f8fafc; --text-dim: #94a3b8; --border: rgba(255, 255, 255, 0.08); 
        }
        .light-mode { 
            --bg: #f8fafc; --card: #ffffff; --accent: #2563eb; 
            --text-main: #1e293b; --text-dim: #64748b; --border: rgba(0, 0, 0, 0.08); 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans Georgian', sans-serif; }
        body { background: var(--bg); color: var(--text-main); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); line-height: 1.6; }

        /* Header */
        .header { position: fixed; top: 0; width: 100%; height: 70px; background: var(--bg); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; z-index: 1000; backdrop-filter: blur(10px); }
        .logo { font-family: 'Noto Serif Georgian'; font-weight: 700; font-size: 1.5rem; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; }

        /* Layout */
        .container { display: flex; max-width: 1400px; margin: 0 auto; padding-top: 70px; }
        
        .sidebar { width: 280px; height: calc(100vh - 70px); position: fixed; padding: 40px 20px; border-right: 1px solid var(--border); overflow-y: auto; }
        .content { margin-left: 280px; flex: 1; padding: 40px 60px; }

        .cat-item { padding: 12px 20px; border-radius: 12px; color: var(--text-dim); cursor: pointer; transition: 0.2s; margin-bottom: 8px; font-weight: 400; }
        .cat-item:hover { background: var(--border); color: var(--text-main); }
        .cat-item.active { background: var(--accent); color: white; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3); }

        /* Article Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; margin-top: 30px; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 30px; border-radius: 24px; cursor: pointer; transition: 0.3s; position: relative; display: flex; flex-direction: column; justify-content: space-between; height: 220px; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .card h3 { font-family: 'Noto Serif Georgian'; font-size: 1.25rem; margin-bottom: 15px; }
        .card-meta { font-size: 0.85rem; color: var(--text-dim); }

        /* Reader View (Full Page Modal) */
        .reader { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: none; overflow-y: auto; padding: 60px 20px; animation: fadeIn 0.3s forwards; }
        .reader-content { max-width: 750px; margin: 0 auto; }
        .reader-header { margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .close-reader { position: fixed; top: 30px; right: 40px; font-size: 30px; cursor: pointer; color: var(--text-dim); }

        /* Editor Toolbar */
        .toolbar { display: flex; gap: 8px; padding: 10px; background: var(--card); border-radius: 12px; margin-bottom: 15px; border: 1px solid var(--border); sticky: top 0; }
        .toolbar button, .toolbar input { padding: 8px; border: none; background: transparent; color: var(--text-main); cursor: pointer; border-radius: 6px; }
        .toolbar button:hover { background: var(--border); }
        #editor { min-height: 400px; padding: 20px; background: var(--card); border-radius: 15px; border: 1px solid var(--border); outline: none; }

        .fab { position: fixed; bottom: 40px; right: 40px; width: 65px; height: 65px; background: var(--accent); color: white; border-radius: 50%; border: none; font-size: 28px; cursor: pointer; box-shadow: 0 8px 25px rgba(37, 99, 235, 0.4); display: none; align-items: center; justify-content: center; z-index: 1500; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 900px) {
            .sidebar { transform: translateX(-100%); z-index: 1100; background: var(--bg); }
            .content { margin-left: 0; padding: 30px 20px; }
            .header { padding: 0 20px; }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">Sophia</div>
        <div style="display:flex; gap:20px;">
            <button onclick="toggleTheme()" style="background:none; border:none; cursor:pointer; font-size:20px;">🌓</button>
            <button onclick="showLogin()" id="lockBtn" style="background:none; border:none; cursor:pointer; font-size:20px;">🔒</button>
        </div>
    </header>

    <div class="container">
        <aside class="sidebar" id="sidebar">
            <div class="cat-item active" onclick="goHome()">🏠 მთავარი</div>
            <div id="catList" style="margin-top:20px;"></div>
        </aside>

        <main class="content" id="mainContent">
            <h1 style="font-family:'Noto Serif Georgian'; font-size: 2.5rem; margin-bottom: 10px;">არქივი</h1>
            <p style="color:var(--text-dim);">აირჩიეთ კატეგორია კვლევის დასაწყებად.</p>
            <div class="grid" id="notesGrid"></div>
        </main>
    </div>

    <div id="reader" class="reader">
        <span class="close-reader" onclick="closeReader()">✕</span>
        <article class="reader-content">
            <div class="reader-header">
                <h1 id="readTitle" style="font-family:'Noto Serif Georgian'; font-size: 3rem;"></h1>
                <p id="readDate" style="color:var(--text-dim); margin-top:10px;"></p>
            </div>
            <div id="readBody" style="font-size: 1.2rem; line-height: 1.8;"></div>
        </article>
    </div>

    <div class="modal" id="editorModal" style="position:fixed; inset:0; background:var(--bg); z-index:3000; display:none; padding:40px 20px; overflow-y:auto;">
        <div style="max-width:800px; margin:0 auto;">
            <h2 id="modalTitle">ახალი ჩანაწერი</h2><br>
            <input type="text" id="noteTitle" placeholder="სტატიის სათაური..." style="width:100%; padding:15px; background:var(--card); border:1px solid var(--border); color:var(--text-main); border-radius:12px; margin-bottom:15px; font-size:1.5rem;">
            
            <div class="toolbar">
                <button onclick="exec('bold')"><b>B</b></button>
                <button onclick="exec('italic')"><i>I</i></button>
                <button onclick="exec('underline')"><u>U</u></button>
                <input type="color" onchange="exec('foreColor', this.value)">
                <select onchange="exec('fontSize', this.value)" style="background:none; color:var(--text-main); border:none;">
                    <option value="3">ზომა</option>
                    <option value="4">საშუალო</option>
                    <option value="6">დიდი</option>
                    <option value="7">სათაური</option>
                </select>
                <button onclick="insertImg()">🖼️</button>
            </div>

            <div id="editor" contenteditable="true"></div>
            
            <div style="display:flex; gap:15px; margin-top:30px;">
                <button onclick="saveNote()" style="flex:1; padding:15px; background:var(--accent); color:white; border:none; border-radius:12px; font-weight:bold; cursor:pointer;">შენახვა</button>
                <button onclick="closeModal('editorModal')" style="flex:1; padding:15px; background:var(--border); color:var(--text-main); border:none; border-radius:12px; cursor:pointer;">გაუქმება</button>
            </div>
        </div>
    </div>

    <div id="loginModal" class="reader" style="background: rgba(0,0,0,0.9); display:none; align-items:center; justify-content:center;">
        <div style="background:var(--card); padding:40px; border-radius:24px; width:100%; max-width:400px; text-align:center;">
            <h3>ადმინისტრატორი</h3><br>
            <input type="email" id="emailInput" placeholder="მეილი" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid var(--border);">
            <input type="password" id="passInput" placeholder="პაროლი" style="width:100%; padding:12px; margin-bottom:20px; border-radius:8px; border:1px solid var(--border);">
            <button onclick="login()" style="width:100%; padding:12px; background:var(--accent); color:white; border:none; border-radius:8px; cursor:pointer;">შესვლა</button>
            <p onclick="closeModal('loginModal')" style="margin-top:20px; color:var(--text-dim); cursor:pointer;">დახურვა</p>
        </div>
    </div>

    <button class="fab" id="fabBtn" onclick="openEditor()">+</button>

    <script>
        const API_KEY = "AIzaSyCLDlXXqAgJp5SdE_xefzS1sQ2fHI-l1Tg"; 
        const DB_URL = "https://gen-lang-client-0339684222-default-rtdb.firebaseio.com/notes";
        
        let token = localStorage.getItem('fb_token');
        let notes = [];
        let currentCat = null;
        let editingId = null;

        const categories = [
            {id: 'epist', name: 'ეპისტემოლოგია'}, {id: 'ethics', name: 'ეთიკა'},
            {id: 'logic', name: 'ლოგიკა'}, {id: 'meta', name: 'მეტაფიზიკა'}
        ];

        function exec(cmd, val = null) { document.execCommand(cmd, false, val); }
        function insertImg() { const url = prompt("სურათის ლინკი:"); if(url) exec('insertImage', url); }

        async function fetchNotes() {
            const res = await fetch(`${DB_URL}.json`);
            const data = await res.json();
            notes = data ? Object.entries(data).map(([k, v]) => ({...v, fbId: k})) : [];
            if(currentCat) renderNotes();
        }

        function renderNotes() {
            const grid = document.getElementById('notesGrid');
            const filtered = notes.filter(n => n.cat === currentCat.id);
            grid.innerHTML = "";
            
            filtered.sort((a,b) => b.date - a.date).forEach(n => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openReader(n);
                
                card.innerHTML = `
                    <div>
                        <h3>${n.title}</h3>
                        <div class="card-meta">${new Date(n.date).toLocaleDateString('ka-GE')}</div>
                    </div>
                    ${token ? `
                    <div style="display:flex; gap:10px; margin-top:15px;" onclick="event.stopPropagation()">
                        <button onclick="editNote('${n.fbId}')" style="background:none; border:none; cursor:pointer; color:var(--accent);">✏️ შეცვლა</button>
                        <button onclick="deleteNote('${n.fbId}')" style="background:none; border:none; cursor:pointer; color:#ef4444;">🗑️ წაშლა</button>
                    </div>` : ''}
                `;
                grid.appendChild(card);
            });
            document.getElementById('fabBtn').style.display = (token && currentCat) ? 'flex' : 'none';
        }

        function openReader(note) {
            document.getElementById('readTitle').innerText = note.title;
            document.getElementById('readDate').innerText = new Date(note.date).toLocaleDateString('ka-GE');
            document.getElementById('readBody').innerHTML = note.content;
            document.getElementById('reader').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeReader() {
            document.getElementById('reader').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function editNote(id) {
            const note = notes.find(n => n.fbId === id);
            editingId = id;
            document.getElementById('modalTitle').innerText = "რედაქტირება";
            document.getElementById('noteTitle').value = note.title;
            document.getElementById('editor').innerHTML = note.content;
            document.getElementById('editorModal').style.display = 'block';
        }

        async function saveNote() {
            const title = document.getElementById('noteTitle').value;
            const content = document.getElementById('editor').innerHTML;
            if(!title || !content) return;

            const noteData = { title, content, cat: currentCat.id, date: Date.now() };
            const url = editingId ? `${DB_URL}/${editingId}.json?auth=${token}` : `${DB_URL}.json?auth=${token}`;
            const res = await fetch(url, { method: editingId ? 'PUT' : 'POST', body: JSON.stringify(noteData) });

            if(res.ok) { closeModal('editorModal'); fetchNotes(); }
        }

        async function login() {
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passInput').value;
            const res = await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key=${API_KEY}`, {
                method: 'POST', body: JSON.stringify({ email, password, returnSecureToken: true })
            });
            const data = await res.json();
            if(data.idToken) { localStorage.setItem('fb_token', data.idToken); location.reload(); }
        }

        async function deleteNote(id) {
            if(confirm("წავშალოთ ჩანაწერი?")) {
                await fetch(`${DB_URL}/${id}.json?auth=${token}`, { method: 'DELETE' });
                fetchNotes();
            }
        }

        function init() {
            const list = document.getElementById('catList');
            categories.forEach(c => {
                const d = document.createElement('div');
                d.className = 'cat-item'; d.innerText = c.name;
                d.onclick = () => {
                    document.querySelectorAll('.cat-item').forEach(el => el.classList.remove('active'));
                    d.classList.add('active');
                    currentCat = c;
                    renderNotes();
                };
                list.appendChild(d);
            });
            if(token) document.getElementById('lockBtn').innerText = "🔓";
            fetchNotes();
        }

        function openEditor() { editingId = null; document.getElementById('noteTitle').value = ""; document.getElementById('editor').innerHTML = ""; document.getElementById('editorModal').style.display = 'block'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function showLogin() { if(token) { localStorage.removeItem('fb_token'); location.reload(); } else document.getElementById('loginModal').style.display = 'flex'; }
        function toggleTheme() { document.body.classList.toggle('light-mode'); }
        function goHome() { location.reload(); }

        init();
    </script>
</body>
</html>
