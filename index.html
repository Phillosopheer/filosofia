<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ფილოსოფია</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@400;700&family=Noto+Serif+Georgian&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0d0d0d; --card: #1a1a1a; --text: #e0e0e0; --primary: #3b82f6; --border: #333; }
        .light-mode { --bg: #f5f5f7; --card: #ffffff; --text: #1d1d1f; --primary: #0071e3; --border: #d2d2d7; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; transition: 0.3s; }
        body { font-family: 'Noto Sans Georgian', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        
        .header { background: var(--card); border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; width: 100%; z-index: 100; height: 65px; }
        .search-bar { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 8px 15px; border-radius: 20px; width: 40%; outline: none; }
        
        .sidebar { position: fixed; top: 65px; left: -280px; width: 280px; height: calc(100vh - 65px); background: var(--card); z-index: 200; padding: 20px; border-right: 1px solid var(--border); overflow-y: auto; }
        .sidebar.active { left: 0; }
        
        .main { margin-top: 80px; padding: 20px; max-width: 900px; margin-left: auto; margin-right: auto; }
        .note-card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 20px; margin-bottom: 20px; position: relative; }
        .delete-btn { position: absolute; top: 15px; right: 15px; background: none; border: none; color: #ff4444; cursor: pointer; font-size: 18px; opacity: 0.6; }
        .delete-btn:hover { opacity: 1; }

        .controls { display: flex; gap: 10px; align-items: center; }
        select { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 5px; padding: 5px; cursor: pointer; }
        
        .fab { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--primary); border-radius: 50%; border: none; color: white; font-size: 30px; z-index: 100; display: none; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 300; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-box { background: var(--card); padding: 25px; border-radius: 20px; width: 100%; max-width: 500px; border: 1px solid var(--border); }
        .form-input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 10px; margin-bottom: 15px; font-family: inherit; }

        @media (min-width: 1024px) { .sidebar { left: 0; } .main { margin-left: 300px; } .header .menu-toggle { display: none; } }
    </style>
</head>
<body id="body">

    <header class="header">
        <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('active')" style="background:none; border:none; color:var(--primary); font-size:24px;">☰</button>
        <input type="text" class="search-bar" id="search" placeholder="ძებნა..." oninput="renderNotes()">
        <div class="controls">
            <button onclick="toggleTheme()" id="themeBtn" style="background:none; border:none; font-size:20px; cursor:pointer;">🌙</button>
            <select id="fontSelector" onchange="changeFont()">
                <option value="'Noto Sans Georgian'">Sans</option>
                <option value="'Noto Serif Georgian'">Serif</option>
                <option value="monospace">Mono</option>
            </select>
        </div>
    </header>

    <aside class="sidebar" id="sidebar">
        <h2 style="margin-bottom:20px; color:var(--primary);">📖 ფილოსოფია</h2>
        <div id="categoryList"></div>
    </aside>

    <main class="main" id="contentArea">
        <div id="homeView">
            <h1 style="color:var(--primary); font-size: 2.5rem; margin-bottom: 20px;">გამარჯობა</h1>
            <p style="font-size: 1.2rem; line-height: 1.8; color: #888;">ეს არის თქვენი პირადი ფილოსოფიური სივრცე. აქ შეგიძლიათ დააგროვოთ არგუმენტები, მსჯელობები და იდეები სხვადასხვა კატეგორიების მიხედვით. <br><br> დასაწყებად აირჩიეთ კატეგორია მენიუდან.</p>
        </div>
    </main>

    <button class="fab" id="fabBtn" onclick="document.getElementById('modal').classList.add('active')">+</button>

    <div class="modal" id="modal">
        <div class="modal-box">
            <h3 style="margin-bottom: 15px;">ახალი ჩანაწერი</h3>
            <input type="text" class="form-input" id="inputTitle" placeholder="სათაური">
            <textarea class="form-input" id="inputContent" rows="6" placeholder="თქვენი მსჯელობა..."></textarea>
            <button onclick="saveNote()" id="saveBtn" style="width:100%; padding:15px; background:var(--primary); border:none; border-radius:10px; color:white; font-weight:700; cursor:pointer;">💾 შენახვა</button>
            <button onclick="document.getElementById('modal').classList.remove('active')" style="width:100%; margin-top:10px; color:#666; background:none; border:none; cursor:pointer;">გაუქმება</button>
        </div>
    </div>

    <script>
        const DB_URL = "https://gen-lang-client-0339684222-default-rtdb.firebaseio.com/notes"; // შევცვალე სტრუქტურა წაშლისთვის

        const CATEGORIES = [
            { id: "epistemology", name: "ეპისტემოლოგია" },
            { id: "metaphysics", name: "მეტაფიზიკა" },
            { id: "ontology", name: "ონტოლოგია" },
            { id: "logic", name: "ლოგიკა" },
            { id: "ethics", name: "ეთიკა" }
        ];

        let notes = [];
        let currentCategory = null;

        async function syncData() {
            try {
                const res = await fetch(`${DB_URL}.json`);
                const data = await res.json();
                notes = data ? Object.entries(data).map(([key, value]) => ({...value, firebaseId: key})) : [];
                renderNotes();
            } catch (e) { console.error(e); }
        }

        async function saveNote() {
            const title = document.getElementById('inputTitle').value.trim();
            const content = document.getElementById('inputContent').value.trim();
            if(!currentCategory || !title || !content) return;
            
            const btn = document.getElementById('saveBtn');
            btn.disabled = true;

            const newNote = {
                id: Date.now(),
                category: currentCategory.id,
                title: title,
                content: content,
                date: new Date().toLocaleString('ka-GE')
            };

            try {
                const response = await fetch(`${DB_URL}.json`, {
                    method: 'POST',
                    body: JSON.stringify(newNote)
                });
                if(response.ok) {
                    await syncData();
                    document.getElementById('inputTitle').value = '';
                    document.getElementById('inputContent').value = '';
                    document.getElementById('modal').classList.remove('active');
                }
            } catch (e) { alert("შეცდომა!"); }
            btn.disabled = false;
        }

        async function deleteNote(firebaseId) {
            if(!confirm("ნამდვილად გსურთ წაშლა?")) return;
            try {
                const response = await fetch(`${DB_URL}/${firebaseId}.json`, { method: 'DELETE' });
                if(response.ok) syncData();
            } catch (e) { alert("ვერ წაიშალა"); }
        }

        function toggleTheme() {
            const body = document.getElementById('body');
            body.classList.toggle('light-mode');
            document.getElementById('themeBtn').innerText = body.classList.contains('light-mode') ? "☀️" : "🌙";
        }

        function changeFont() {
            document.body.style.setProperty('font-family', document.getElementById('fontSelector').value, 'important');
        }

        function renderNotes() {
            const area = document.getElementById('contentArea');
            const searchTerm = document.getElementById('search').value.toLowerCase();
            
            if(!currentCategory) return;
            
            let filtered = notes.filter(n => n.category === currentCategory.id && 
                (n.title.toLowerCase().includes(searchTerm) || n.content.toLowerCase().includes(searchTerm)));
            
            area.innerHTML = `<h2 style="color:var(--primary); margin-bottom:20px;">${currentCategory.name}</h2>` + 
                (filtered.length === 0 ? '<p style="color:#666">ჩანაწერები ვერ მოიძებნა.</p>' : 
                filtered.sort((a,b) => b.id - a.id).map(n => `
                    <div class="note-card">
                        <button class="delete-btn" onclick="deleteNote('${n.firebaseId}')">🗑️</button>
                        <h3 style="margin-right:30px;">${n.title}</h3>
                        <p style="margin-top:10px; white-space:pre-wrap; color:var(--text); opacity:0.8;">${n.content}</p>
                        <small style="display:block; margin-top:15px; font-size:10px; color:#555;">${n.date}</small>
                    </div>
                `).join(''));
        }

        const list = document.getElementById('categoryList');
        CATEGORIES.forEach(cat => {
            const btn = document.createElement('button');
            btn.style = "width:100%; padding:15px; margin-bottom:10px; background:none; border:1px solid var(--border); color:var(--text); border-radius:10px; text-align:left; cursor:pointer;";
            btn.innerText = cat.name;
            btn.onclick = () => {
                currentCategory = cat;
                document.getElementById('fabBtn').style.display = 'flex';
                if(window.innerWidth < 1024) document.getElementById('sidebar').classList.remove('active');
                renderNotes();
            };
            list.appendChild(btn);
        });

        syncData();
    </script>
</body>
</html>
