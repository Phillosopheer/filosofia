<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ფილოსოფია</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@400;700&family=Noto+Serif+Georgian&family=Fira+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0d0d0d; --card: #1a1a1a; --text: #e0e0e0; --primary: #3b82f6; --border: #333; }
        .light-mode { --bg: #f5f5f7; --card: #ffffff; --text: #1d1d1f; --primary: #0071e3; --border: #d2d2d7; }
        * { margin: 0; padding: 0; box-sizing: border-box; transition: 0.2s; }
        body { font-family: 'Noto Sans Georgian', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        
        .header { background: var(--card); border-bottom: 1px solid var(--border); padding: 0 20px; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; width: 100%; z-index: 100; height: 60px; }
        .search-bar { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 8px 15px; border-radius: 10px; width: 45%; outline: none; }
        
        .sidebar { position: fixed; top: 60px; left: -280px; width: 280px; height: calc(100vh - 60px); background: var(--card); z-index: 200; padding: 20px; border-right: 1px solid var(--border); overflow-y: auto; }
        .sidebar.active { left: 0; }
        
        .main { margin-top: 80px; padding: 20px; max-width: 800px; margin-left: auto; margin-right: auto; }
        .note-card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 25px; margin-bottom: 20px; position: relative; }
        .delete-btn { position: absolute; top: 15px; right: 15px; background: none; border: none; color: #ff4444; cursor: pointer; font-size: 18px; opacity: 0.3; }
        .delete-btn:hover { opacity: 1; }
        
        .toolbar { display: flex; flex-wrap: wrap; gap: 8px; background: var(--bg); padding: 12px; border: 1px solid var(--border); border-radius: 12px 12px 0 0; }
        .toolbar button, .toolbar select, .toolbar input { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 5px; cursor: pointer; border-radius: 5px; }
        
        #editor { min-height: 250px; background: var(--bg); border: 1px solid var(--border); padding: 15px; border-radius: 0 0 12px 12px; outline: none; color: var(--text); font-size: 16px; overflow-y: auto; }

        .fab { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--primary); border-radius: 50%; border: none; color: white; font-size: 30px; z-index: 100; display: none; align-items: center; justify-content: center; cursor: pointer; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 300; display: none; align-items: center; justify-content: center; padding: 15px; }
        .modal.active { display: flex; }
        .modal-box { background: var(--card); padding: 20px; border-radius: 20px; width: 100%; max-width: 700px; border: 1px solid var(--border); }
        
        .cat-btn { width: 100%; padding: 14px; margin-bottom: 8px; background: none; border: 1px solid var(--border); color: var(--text); border-radius: 10px; text-align: left; cursor: pointer; }
        .cat-btn.active { border-color: var(--primary); color: var(--primary); background: rgba(59,130,246,0.1); }

        @media (min-width: 1024px) { .sidebar { left: 0; } .main { margin-left: 310px; } .header .menu-toggle { display: none; } }
    </style>
</head>
<body id="body">

    <header class="header">
        <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('active')" style="background:none; border:none; color:var(--primary); font-size:24px;">☰</button>
        <input type="text" class="search-bar" id="search" placeholder="ძებნა..." onkeyup="renderNotes()">
        <button onclick="toggleTheme()" id="themeBtn" style="background:none; border:none; font-size:22px; cursor:pointer;">🌙</button>
    </header>

    <aside class="sidebar" id="sidebar">
        <h2 style="margin-bottom:20px; color:var(--primary);">ფილოსოფია</h2>
        <button class="cat-btn active" id="homeBtn" onclick="goHome()">🏠 მთავარი</button>
        <hr style="border: 0; border-top: 1px solid #333; margin: 15px 0;">
        <div id="categoryList"></div>
    </aside>

    <main class="main" id="contentArea"></main>

    <button class="fab" id="fabBtn" onclick="openModal()">+</button>

    <div class="modal" id="modal">
        <div class="modal-box">
            <input type="text" id="inputTitle" placeholder="სათაური" style="width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text); padding:12px; border-radius:10px; margin-bottom:10px; outline:none;">
            
            <div class="toolbar">
                <button onclick="execCmd('bold')"><b>B</b></button>
                <button onclick="execCmd('italic')"><i>I</i></button>
                <select onchange="execCmd('fontSize', this.value)">
                    <option value="3">ზომა</option>
                    <option value="1">ძალიან პატარა</option>
                    <option value="3">ნორმალური</option>
                    <option value="5">დიდი</option>
                    <option value="7">ძალიან დიდი</option>
                </select>
                <input type="color" onchange="execCmd('foreColor', this.value)">
                <select onchange="execCmd('fontName', this.value)">
                    <option value="'Noto Sans Georgian'">Sans</option>
                    <option value="'Noto Serif Georgian'">Serif</option>
                    <option value="'Fira Mono'">Mono</option>
                </select>
            </div>
            <div id="editor" contenteditable="true"></div>

            <button onclick="saveNote()" id="saveBtn" style="width:100%; padding:15px; background:var(--primary); border:none; border-radius:10px; color:white; font-weight:700; margin-top:15px; cursor:pointer;">💾 შენახვა</button>
            <button onclick="closeModal()" style="width:100%; margin-top:10px; color:#666; background:none; border:none; cursor:pointer;">გაუქმება</button>
        </div>
    </div>

    <script>
        const DB_URL = "https://gen-lang-client-0339684222-default-rtdb.firebaseio.com/notes";
        let notes = [];
        let currentCategory = null;

        // ბრძანებების ფუნქცია - უფრო სტაბილური რედაქტირებისთვის
        function execCmd(cmd, val) {
            document.execCommand(cmd, false, val);
            document.getElementById('editor').focus();
        }

        async function syncData() {
            try {
                const res = await fetch(`${DB_URL}.json`);
                const data = await res.json();
                notes = data ? Object.entries(data).map(([key, value]) => ({...value, firebaseId: key})) : [];
                if (!currentCategory) goHome(); else renderNotes();
            } catch (e) { console.error(e); }
        }

        function goHome() {
            currentCategory = null;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('homeBtn').classList.add('active');
            document.getElementById('fabBtn').style.display = 'none';
            
            document.getElementById('contentArea').innerHTML = `
                <div style="padding-top: 30px;">
                    <h1 style="color:var(--primary); font-size: 2.5rem; margin-bottom: 20px;">მოგესალმებით</h1>
                    <p style="font-size: 1.2rem; line-height: 1.8; color: #aaa;">
                        ეს არის <strong>საჯარო ფილოსოფიური არქივი</strong>. <br><br>
                        მნახველებისთვის: აქ თავმოყრილია სხვადასხვა მსჯელობები, არგუმენტები და იდეები ეთიკის, მეტაფიზიკის და სხვა სფეროების შესახებ. 
                        შეგიძლიათ თავისუფლად დაათვალიეროთ კატეგორიები და გამოიყენოთ საძიებო ველი კონკრეტული თემების მოსაძებნად.
                    </p>
                    <div style="margin-top:40px; padding:20px; border-left:4px solid var(--primary); background:var(--card);">
                        <small style="color:#666;">ავტორისთვის: ჩანაწერების დასამატებლად აირჩიეთ კატეგორია.</small>
                    </div>
                </div>`;
        }

        async function saveNote() {
            const title = document.getElementById('inputTitle').value.trim();
            const content = document.getElementById('editor').innerHTML;
            if(!currentCategory || !title || content === "") return alert("შეავსეთ ველები!");
            
            const btn = document.getElementById('saveBtn');
            btn.disabled = true;

            try {
                await fetch(`${DB_URL}.json`, { 
                    method: 'POST', 
                    body: JSON.stringify({
                        id: Date.now(),
                        category: currentCategory.id,
                        title: title,
                        content: content,
                        date: new Date().toLocaleString('ka-GE')
                    }) 
                });
                await syncData();
                closeModal();
            } catch (e) { alert("შეცდომა!"); }
            btn.disabled = false;
        }

        async function deleteNote(id) {
            if(confirm("წავშალოთ?")) {
                await fetch(`${DB_URL}/${id}.json`, { method: 'DELETE' });
                syncData();
            }
        }

        function renderNotes() {
            const area = document.getElementById('contentArea');
            const search = document.getElementById('search').value.toLowerCase();
            if(!currentCategory) return;
            
            let filtered = notes.filter(n => n.category === currentCategory.id && 
                (n.title.toLowerCase().includes(search) || n.content.replace(/<[^>]*>/g, '').toLowerCase().includes(search)));
            
            area.innerHTML = `<h2 style="color:var(--primary); margin-bottom:20px;">${currentCategory.name}</h2>` + 
                (filtered.length === 0 ? '<p style="color:#666">არგუმენტები არ არის.</p>' : 
                filtered.sort((a,b) => b.id - a.id).map(n => `
                    <div class="note-card">
                        <button class="delete-btn" onclick="deleteNote('${n.firebaseId}')">🗑️</button>
                        <h3 style="margin-bottom:15px; color:var(--primary);">${n.title}</h3>
                        <div style="line-height:1.6;">${n.content}</div>
                        <small style="display:block; margin-top:20px; font-size:10px; color:#444; text-align:right;">${n.date}</small>
                    </div>
                `).join(''));
        }

        function openModal() { document.getElementById('modal').classList.add('active'); }
        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            document.getElementById('inputTitle').value = "";
            document.getElementById('editor').innerHTML = "";
        }

        function toggleTheme() {
            document.getElementById('body').classList.toggle('light-mode');
            document.getElementById('themeBtn').innerText = document.getElementById('body').classList.contains('light-mode') ? "☀️" : "🌙";
        }

        const CATEGORIES = [
            { id: "epistemology", name: "ეპისტემოლოგია" },
            { id: "metaphysics", name: "მეტაფიზიკა" },
            { id: "ontology", name: "ონტოლოგია" },
            { id: "logic", name: "ლოგიკა" },
            { id: "ethics", name: "ეთიკა" }
        ];

        const list = document.getElementById('categoryList');
        CATEGORIES.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'cat-btn';
            btn.innerText = cat.name;
            btn.onclick = () => {
                currentCategory = cat;
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('fabBtn').style.display = 'flex';
                if(window.innerWidth < 1024) document.getElementById('sidebar').classList.remove('active');
                renderNotes();
            };
            list.appendChild(btn);
        });

        syncData();
    </script>
</body>
</html>
