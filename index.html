<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ფილოსოფია</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;700&family=Noto+Serif+Georgian:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0e; --card: #161618; --accent: #3b82f6;
            --text-main: #ffffff; --text-dim: #a1a1aa; --border: rgba(255, 255, 255, 0.1);
        }
        .light-mode {
            --bg: #f5f5f7; --card: #ffffff; --accent: #0071e3;
            --text-main: #1d1d1f; --text-dim: #6e6e73; --border: rgba(0, 0, 0, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans Georgian', sans-serif; }
        body { background: var(--bg); color: var(--text-main); transition: 0.3s; }

        /* Header */
        .nav-header {
            position: fixed; top: 0; width: 100%; height: 65px;
            background: var(--bg); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 25px; z-index: 1000; backdrop-filter: blur(10px);
        }
        .logo { font-size: 20px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; }
        .search-bar {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            padding: 8px 15px; border-radius: 12px; color: var(--text-main); width: 40%; outline: none;
        }

        /* Sidebar */
        .sidebar {
            position: fixed; top: 65px; left: 0; width: 260px; height: 100vh;
            background: var(--card); border-right: 1px solid var(--border);
            padding: 30px 15px; z-index: 900;
        }
        .cat-link {
            padding: 12px 15px; margin-bottom: 5px; border-radius: 10px;
            color: var(--text-dim); cursor: pointer; transition: 0.2s;
        }
        .cat-link:hover, .cat-link.active { background: rgba(59, 130, 246, 0.1); color: var(--accent); font-weight: 600; }

        /* Main Content */
        .content-wrapper { margin-left: 260px; margin-top: 65px; padding: 40px; max-width: 900px; }
        .hero-title { font-size: 42px; margin-bottom: 20px; font-family: 'Noto Serif Georgian', serif; }

        /* Cards */
        .article-card {
            background: var(--card); border: 1px solid var(--border);
            padding: 25px; border-radius: 18px; margin-bottom: 20px;
            position: relative; transition: 0.3s; cursor: pointer;
        }
        .article-card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .article-card h3 { font-family: 'Noto Serif Georgian', serif; margin-bottom: 10px; color: var(--accent); }
        
        .card-actions { position: absolute; top: 20px; right: 20px; display: flex; gap: 12px; }
        .action-btn { background: none; border: none; cursor: pointer; font-size: 16px; opacity: 0.4; transition: 0.2s; }
        .action-btn:hover { opacity: 1; transform: scale(1.1); }

        /* Modal & Editor */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; z-index: 2000; padding: 30px; overflow-y: auto;
        }
        .modal.active { display: flex; flex-direction: column; align-items: center; }
        .editor-box { width: 100%; max-width: 800px; background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--border); }
        
        .toolbar { display: flex; flex-wrap: wrap; gap: 10px; padding: 10px; background: var(--bg); border-radius: 10px; margin-bottom: 15px; }
        .toolbar button, .toolbar select, .toolbar input { background: var(--card); border: 1px solid var(--border); color: var(--text-main); padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        
        #editor { min-height: 350px; outline: none; font-size: 18px; line-height: 1.7; font-family: 'Noto Serif Georgian', serif; color: var(--text-main); }

        .fab {
            position: fixed; bottom: 35px; right: 35px; width: 60px; height: 60px;
            background: var(--accent); color: white; border-radius: 50%;
            border: none; font-size: 30px; cursor: pointer; box-shadow: 0 8px 20px rgba(59,130,246,0.3); z-index: 1000;
        }

        @media (max-width: 1024px) { .sidebar { display: none; } .content-wrapper { margin-left: 0; } }
    </style>
</head>
<body id="body">

    <header class="nav-header">
        <div class="logo">ფილოსოფია</div>
        <input type="text" class="search-bar" id="search" placeholder="ძიება..." onkeyup="renderNotes()">
        <button onclick="toggleTheme()" style="background:none; border:none; font-size:20px; cursor:pointer;">🌓</button>
    </header>

    <aside class="sidebar" id="sidebar">
        <div class="cat-link active" id="homeBtn" onclick="goHome()">🏠 მთავარი</div>
        <div style="margin: 25px 0 10px 15px; font-size: 11px; color: #555; text-transform: uppercase;">კატეგორიები</div>
        <div id="categoryList"></div>
    </aside>

    <main class="content-wrapper" id="contentArea"></main>

    <button class="fab" id="fabBtn" onclick="openModal()" style="display: none;">+</button>

    <div class="modal" id="modal">
        <div class="editor-box">
            <input type="text" id="inputTitle" placeholder="სათაური..." style="width:100%; background:none; border:none; border-bottom:1px solid var(--border); color:var(--text-main); font-size:28px; padding-bottom:15px; margin-bottom:20px; outline:none;">
            
            <div class="toolbar">
                <button onclick="execCmd('bold')"><b>B</b></button>
                <button onclick="execCmd('italic')"><i>I</i></button>
                <select onchange="execCmd('fontSize', this.value)">
                    <option value="3">ზომა</option>
                    <option value="2">პატარა</option>
                    <option value="4">დიდი</option>
                    <option value="6">XL</option>
                </select>
                <input type="color" onchange="execCmd('foreColor', this.value)">
                <select onchange="execCmd('fontName', this.value)">
                    <option value="'Noto Serif Georgian'">Serif</option>
                    <option value="'Noto Sans Georgian'">Sans</option>
                </select>
            </div>

            <div id="editor" contenteditable="true"></div>

            <div style="display: flex; gap: 15px; margin-top: 30px;">
                <button onclick="saveNote()" id="saveBtn" style="flex:1; padding:15px; background:var(--accent); color:white; border:none; border-radius:12px; font-weight:700; cursor:pointer;">💾 შენახვა</button>
                <button onclick="closeModal()" style="padding:15px 25px; background:rgba(255,255,255,0.05); color:var(--text-main); border:1px solid var(--border); border-radius:12px; cursor:pointer;">გაუქმება</button>
            </div>
        </div>
    </div>

    <div class="modal" id="viewModal" onclick="closeView()">
        <div class="editor-box" onclick="event.stopPropagation()" style="background:none; border:none;">
            <h1 id="viewTitle" style="font-size: 40px; margin-bottom: 30px; font-family: 'Noto Serif Georgian', serif;"></h1>
            <div id="viewContent" style="font-size: 19px; line-height: 1.8; font-family: 'Noto Serif Georgian', serif;"></div>
            <button onclick="closeView()" style="margin-top:40px; padding:10px 20px; background:var(--accent); color:white; border:none; border-radius:8px; cursor:pointer;">უკან დაბრუნება</button>
        </div>
    </div>

    <script>
        const DB_URL = "https://gen-lang-client-0339684222-default-rtdb.firebaseio.com/notes";
        let notes = [];
        let currentCategory = null;
        let editingId = null;

        function execCmd(cmd, val) { document.execCommand(cmd, false, val); document.getElementById('editor').focus(); }

        async function syncData() {
            try {
                const res = await fetch(`${DB_URL}.json`);
                const data = await res.json();
                notes = data ? Object.entries(data).map(([key, value]) => ({...value, firebaseId: key})) : [];
                if (!currentCategory) goHome(); else renderNotes();
            } catch (e) { console.error(e); }
        }

        function goHome() {
            currentCategory = null; editingId = null;
            document.querySelectorAll('.cat-link').forEach(l => l.classList.remove('active'));
            document.getElementById('homeBtn').classList.add('active');
            document.getElementById('fabBtn').style.display = 'none';
            document.getElementById('contentArea').innerHTML = `
                <div style="padding-top: 40px;">
                    <h1 class="hero-title">ფილოსოფიური <br> ხედვა</h1>
                    <p style="font-size: 1.2rem; color: var(--text-dim); max-width: 650px; line-height: 1.8;">
                        ეს არის თქვენი პირადი და საჯარო სივრცე. ადგილი, სადაც ყოველი არგუმენტი ინახება და ყოველი მსჯელობა პოულობს თავის ადგილს
